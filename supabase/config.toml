# Local development config for the Supabase CLI stack (`supabase start`).
# This is the DEV environment — a full Supabase running in Docker on localhost.
# Production is a separate Supabase Pro project (see DEPLOYMENT.md); nothing here touches it.
# Reference: https://supabase.com/docs/guides/local-development/cli/config
#
# Trimmed to what this project uses: Postgres + PostgREST (tables + the `graph_neighbors`
# RPC, under RLS public-read) + Auth (GoTrue — required to mint the anon/service_role JWTs the
# frontend and ingestion use) + Studio. Storage/Realtime/Edge/Analytics are disabled to keep
# the local stack lighter — handy when several Conductor worktrees run it at once.

project_id = "cartographie-fonds-publics"

# Ports live on a dedicated 544xx block (not the Supabase CLI defaults 543xx) so this stack runs in
# parallel with other local Supabase projects on the machine (e.g. matchroom-supabase) without a host
# port clash. `project_id` already isolates the containers + volumes; only host ports had to move.
# A fresh `cp .env.example .env` (root + packages/web) already points at these — keep them in sync.

[api]
enabled = true
# Frontend reads here: VITE_SUPABASE_URL=http://127.0.0.1:54421
port = 54421
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
# Direct Postgres for migrations + ingestion: postgresql://postgres:postgres@127.0.0.1:54422/postgres
port = 54422
shadow_port = 54420
# Must match the remote (prod) database's major version. Confirmed: prod runs Postgres 17.x
# (`SHOW server_version;` → 17.6), so 17 matches. Re-check if prod is ever upgraded.
# (CI runs the RLS shim check against a separate bare postgres:16 — see .github/workflows/ci.yml.)
major_version = 17

[db.migrations]
# Local `supabase db reset` applies supabase/migrations/*.sql. Prod uses `make db-migrate`
# (psql) over the same files — same SQL, same order, so dev/prod schema stays in parity.
enabled = true

[db.seed]
# Local `supabase db reset` / `supabase start` loads the ILLUSTRATIVE demo slice (FSC-50..53): a
# design-scale dataset with funds/delegates/participation flows + multi-year budgets, so the
# redesigned screens render rich data in local dev. GENERATED by `make demo-seed` — edit
# `ingestion.demo_seed`, never the SQL. DEV/PREVIEW ONLY (« exemple » amounts; truncates the tables).
# The real, attributed État-central slice lives in `seed.sql` (`make seed`, golden-tested).
enabled = true
sql_paths = ["./demo_seed.sql"]

[studio]
enabled = true
port = 54423
api_url = "http://127.0.0.1"

# Auth (GoTrue) is enabled only to mint the anon/service_role JWTs that PostgREST validates
# and that `supabase status` prints. No login flows are used — access is RLS public-read via
# the anon role.
[auth]
enabled = true

# --- Unused services: disabled for a lean local stack -------------------------------------
[storage]
enabled = false

[realtime]
enabled = false

[edge_runtime]
enabled = false

[analytics]
enabled = false

[inbucket]
enabled = false
