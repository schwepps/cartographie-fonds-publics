<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Cartographie des Fonds Publics">
  <!-- DSFR-consistent mark (blue France #000091 + Marianne red #e1000f): a small network/
       « cartographie » glyph. Hand-authored (DSFR is not an npm dep here); avoids the official
       Marianne logo's government usage restrictions. -->
  <rect width="32" height="32" rx="6" fill="#000091" />
  <g stroke="#ffffff" stroke-width="2" stroke-linecap="round">
    <line x1="16" y1="16" x2="8" y2="8" />
    <line x1="16" y1="16" x2="24" y2="8" />
    <line x1="16" y1="16" x2="8" y2="24" />
    <line x1="16" y1="16" x2="24" y2="24" />
  </g>
  <g fill="#ffffff">
    <circle cx="8" cy="8" r="2.6" />
    <circle cx="24" cy="8" r="2.6" />
    <circle cx="8" cy="24" r="2.6" />
    <circle cx="24" cy="24" r="2.6" />
  </g>
  <circle cx="16" cy="16" r="3.4" fill="#e1000f" />
</svg>
