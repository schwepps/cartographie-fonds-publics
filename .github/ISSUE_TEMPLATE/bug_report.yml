name: Bug report
description: Something is broken
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: "What happened?"
      description: "Steps to reproduce, expected vs actual."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: "Version / commit"
  - type: textarea
    id: logs
    attributes:
      label: "Relevant logs"
      render: shell
