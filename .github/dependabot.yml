version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule: { interval: weekly }
    commit-message: { prefix: "chore(deps)" }
  - package-ecosystem: npm
    directory: "/packages/web"
    schedule: { interval: weekly }
    commit-message: { prefix: "chore(deps)" }
  - package-ecosystem: github-actions
    directory: "/"
    schedule: { interval: weekly }
    commit-message: { prefix: "chore(deps)" }
