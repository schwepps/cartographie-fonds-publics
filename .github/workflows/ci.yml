name: CI
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Sync deps
        run: uv sync --all-packages
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Type check
        run: uv run mypy packages
      - name: Tests
        run: uv run pytest -q

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Sync deps (with audit group)
        run: uv sync --all-packages --group audit
      # Audits the resolved environment (skips local editable packages). pip-audit has no
      # severity gate (all-or-nothing) — block on any advisory; add accepted lower-severity
      # ones via `--ignore-vuln GHSA-…` with a comment explaining why.
      - name: Audit Python dependencies (pip-audit)
        run: uv run --group audit pip-audit --skip-editable

  database:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Sync deps
        run: uv sync --all-packages
      - name: Supabase compatibility shim (roles + grants)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f supabase/tests/supabase_roles.sql
      - name: Migrate a fresh database
        run: make db-migrate
      - name: Verify RLS posture
        run: make db-verify
      - name: Load the curated graph + assert idempotency and RPC visibility (FSC-35)
        env:
          CFP_SNAPSHOT_ROOT: ${{ runner.temp }}/snapshots
        run: |
          set -euo pipefail
          # Build a snapshot per État-central source from the committed offline fixtures (no network).
          uv run python -c "
          from pathlib import Path
          from ingestion.snapshot import write_snapshot, SNAPSHOT_ROOT
          fixtures = {
              'operateurs_etat': 'spikes/phase0_siren_match/fixtures/operateurs_resolve_sample.csv',
              'budget_plf_lfi': 'packages/ingestion/tests/fixtures/plf_depenses_sample.csv',
              'budget_execution_mensuelle': 'packages/ingestion/tests/fixtures/ods_situation_mensuelle.csv',
          }
          for source_id, path in fixtures.items():
              write_snapshot(Path(path).read_bytes(), source_id=source_id, extracted_at='2026-06-09T00:00:00+00:00', root=SNAPSHOT_ROOT)
          print('snapshots written to', SNAPSHOT_ROOT)
          "
          counts() { psql "$DATABASE_URL" -tA -c \
            "select count(*) from entities union all select count(*) from edges union all select count(*) from budget_facts"; }
          make load
          before="$(counts)"
          make load  # re-run: a provenance-scoped reload must not change row counts
          after="$(counts)"
          test "$before" = "$after" || { echo "load is NOT idempotent: [$before] vs [$after]"; exit 1; }
          # The loaded tutelle edges are reachable through the graph_neighbors RPC the UI calls.
          neighbours="$(psql "$DATABASE_URL" -tA -c \
            "select count(*) from graph_neighbors((select source_siren from edges limit 1), 1)")"
          test "${neighbours:-0}" -ge 1 || { echo "graph_neighbors returned no rows"; exit 1; }
          echo "load idempotent (entities/edges/budget_facts = $(echo "$before" | paste -sd/ -)); graph_neighbors ok ($neighbours rows)"
