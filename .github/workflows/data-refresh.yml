name: Data refresh
# Scheduled ingestion -> Supabase. Sources are mostly annual (autumn PLF) / monthly.
# Supabase Pro doesn't pause, so a monthly run is enough (no keep-alive needed).
on:
  schedule:
    - cron: "0 6 1 * *"   # 1st of each month, 06:00 UTC
  workflow_dispatch:
jobs:
  refresh:
    runs-on: ubuntu-latest
    # Least privilege: read the repo, plus open/update the failure-alert issue (see below).
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-packages
      # NOTE: `refresh` is currently a stub that only reports discovery strategies.
      # Switch to `ingest` (discover -> extract -> validate -> snapshot -> stage) once
      # connectors land; only then does curated data actually reach Supabase.
      # Secrets are scoped to this step only — they never reach the third-party github-script below.
      - name: Discover latest millésimes (stub — no Supabase load yet)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: uv run python -m ingestion.cli refresh
      # Vercel auto-deploys the frontend from GitHub; no deploy step needed here.
      # Store raw/heavy extracts as Parquet artifacts (Supabase Storage / release), not in git.

      # FSC-16 AC4: a failed scheduled run surfaces an alert (red CI + a GitHub issue → email).
      # Armed now; a SchemaValidationError will only travel through here once `ingest` (with
      # connectors) replaces the `refresh` stub above. Idempotent: one open tracking issue,
      # commented — never spammed.
      - name: Alert on ingestion failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const label = 'ingestion-failure';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'A scheduled **data-refresh** run failed.',
              '',
              `- Workflow: \`${context.workflow}\``,
              `- Run: ${runUrl}`,
              `- Commit: ${context.sha}`,
            ].join('\n');
            const { owner, repo } = context.repo;
            // Ensure the label exists first, so issues.create({ labels }) can't 422 on a fresh repo.
            try {
              await github.rest.issues.getLabel({ owner, repo, name: label });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.issues.createLabel({ owner, repo, name: label, color: 'b60205', description: 'A scheduled data-refresh run failed' });
            }
            const open = await github.rest.issues.listForRepo({ owner, repo, state: 'open', labels: label });
            if (open.data.length > 0) {
              await github.rest.issues.createComment({ owner, repo, issue_number: open.data[0].number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title: '🚨 Ingestion failure (data-refresh)', labels: [label], body });
            }
