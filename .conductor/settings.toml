# conductor.build — shared team config. Committed so every workspace uses it.
# Docs: https://docs.conductor.build/core/scripts
"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
# Runs on every new workspace (isolated git worktree): deps, .env, shared DB.
setup = "./scripts/conductor-setup.sh"

# Run button: start the web dev server. $CONDUCTOR_PORT keeps parallel
# workspaces from colliding. The API + Postgres run as shared services
# (started once on the host by the setup script) — see CLAUDE.md.
run = "cd packages/web && pnpm dev --port $CONDUCTOR_PORT"
run_mode = "concurrent"
