# Editorial ministerial attributions (FSC-27) — décrets d'attribution mandating ministries.
#
# Manual/editorial-first (golden rule #10: real, verifiable data only). Each entry references a
# ministry by its `tutelle` code (resolved to a SIREN via data/crosswalk/ministeres.yaml) — never a
# SIREN here — plus the real décret d'attribution and its Légifrance URL. The transform
# (ingestion.transforms.legifrance_attributions) resolves the SIREN and emits an `attributions` row.
#
# Scaling path (text -> entity, FSC-66): live PISTE/Légifrance LODA search for "décret d'attribution"
# + NLP/editorial entity linking, human-reviewed before promotion. See data/attributions/README.md.
schema_version: 1
maintainer: contact@cartographie-fonds-publics.fr
entries:
  - tutelle: MESR
    legal_ref: "Décret n° 2025-1021 du 29 octobre 2025 relatif aux attributions du ministre de l'enseignement supérieur, de la recherche et de l'espace"
    source_url: "https://www.legifrance.gouv.fr/jorf/id/JORFTEXT000052457282"
    txt: "Le ministre prépare et met en œuvre la politique du Gouvernement en matière d'enseignement supérieur, de vie étudiante, de recherche, de technologie et d'espace civil."
  - tutelle: MC
    legal_ref: "Décret n° 2025-1016 du 29 octobre 2025 relatif aux attributions du ministre de la culture"
    source_url: "https://www.legifrance.gouv.fr/jorf/id/JORFTEXT000052457068"
    txt: "Le ministre de la culture conduit la politique de sauvegarde, de protection et de mise en valeur du patrimoine, favorise la création et la diffusion des œuvres, l'accès de tous à la culture, les enseignements artistiques, les médias et les industries culturelles, et le rayonnement culturel de la France."
  - tutelle: MTPEI
    legal_ref: "Décret n° 2025-1001 du 29 octobre 2025 relatif aux attributions du ministre du travail et des solidarités"
    source_url: "https://www.legifrance.gouv.fr/jorf/id/JORFTEXT000052456634"
    txt: "Le ministre du travail et des solidarités prépare et met en œuvre la politique du Gouvernement dans les domaines du travail, de l'emploi, de l'insertion professionnelle, de l'apprentissage, de la formation professionnelle, du dialogue social et de la solidarité."
