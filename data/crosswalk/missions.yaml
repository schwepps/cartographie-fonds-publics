# Reviewed mission -> tutelle-ministry reference (FSC-56). Hand-curated, never generated.
#
# The live Jaune « Opérateurs de l'État » records an operator's supervision as a LOLF **mission**
# (e.g. « Recherche et enseignement supérieur »), not a ministry code. This file maps each mission
# to the code of its **lead ministry** in `ministeres.yaml`, so the operators transform can anchor a
# `ministry -> operator` tutelle edge (MinistryIndex resolves the mission, then the code -> SIREN).
#
# It is a documented *lead-ministry* heuristic: a few missions are interministerial (e.g. « Cohésion
# des territoires », « Direction de l'action du Gouvernement »); each is mapped to the single most
# defensible responsible ministry and noted. Every `tutelle` code below MUST exist in
# `ministeres.yaml` (loading fails loud otherwise). See data/crosswalk/README.md.
schema_version: 1
maintainer: contact@cartographie-fonds-publics.fr
