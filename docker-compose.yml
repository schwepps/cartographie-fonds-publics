# Optional LOCAL Redis only (cache for heavy RPCs / ingestion coordination).
# The dev database is the Supabase CLI stack — run `make supabase-up` (`supabase start`),
# which gives a full local Supabase (Postgres + PostgREST + Studio). See DEPLOYMENT.md.
# Production uses Supabase (DB+API) + Vercel (frontend).
services:
  redis:
    image: redis:7
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD in your .env}"]
    ports: ["127.0.0.1:6379:6379"]
